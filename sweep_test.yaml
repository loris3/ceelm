program: ./run_accellerate.sh
method: grid
metric:
  name: train_loss
  goal: minimize
parameters:
  base_model:
    values: 
      - allenai/OLMo-2-0425-1B
      - meta-llama/Llama-3.2-1B
      - Qwen/Qwen2.5-0.5B
  train_dataset:
    value: loris3/tulu3-test
  train_split:
    value: train

  learning_rate:
    values: [1e-5]
  seed:
    values: [42]
  num_train_epochs:
    value: 1
  per_device_train_batch_size:
    value: 4
  gradient_accumulation_steps:
    value: 8
  logging_steps:
    value: 10
  save_total_limit:
    value: 2
  bf16:
    value: true
  report_to:
    value: wandb

command:
- ${env}
- ${program}
- ${args}